name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "postlio_frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "postlio_frontend/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: postlio_frontend

env:
  NODE_VERSION: "20"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: postlio_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  unit:
    name: Jest (unit + RTL)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: postlio_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm run test:ci

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-jest-coverage
          path: postlio_frontend/coverage
          retention-days: 14

  build:
    name: Build (next build)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:8000' }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: postlio_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Upload .next build
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            postlio_frontend/.next
            !postlio_frontend/.next/cache
          include-hidden-files: true
          retention-days: 3

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:8000' }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: postlio_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download built .next
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: postlio_frontend/.next

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright (Chromium)
        run: npm run test:e2e:chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            postlio_frontend/playwright-report
            postlio_frontend/test-results
          retention-days: 14

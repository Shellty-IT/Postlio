name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "postlio_backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "postlio_backend/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: postlio_backend

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: postlio_backend/requirements.txt

      - name: Install ruff
        run: pip install ruff==0.5.7

      - name: Run ruff
        run: ruff check app tests

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postlio
          POSTGRES_PASSWORD: postlio
          POSTGRES_DB: postlio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postlio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TESTING: "true"
      DATABASE_URL: postgresql+asyncpg://postlio:postlio@localhost:5432/postlio_test
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
      HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
      FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
      FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
      LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
      LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      FRONTEND_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: postlio_backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run pytest
        run: |
          pytest \
            -m "unit or integration" \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=pytest-report.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            postlio_backend/coverage.xml
            postlio_backend/pytest-report.xml
          retention-days: 14
